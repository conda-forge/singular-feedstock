{% set version = "4.4.1" %}
{% set name = "singular" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  # Currently, uni-kl.de is blocking requests from the runners on Azure.
  # We use a snapshot from GitHub instead. The snapshot is not identical but
  # the relevant files get recreated anyway by the autoreconf in our build
  # script.
  # url: https://www.singular.uni-kl.de/ftp/pub/Math/Singular/SOURCES/{{ version.replace('.', '-') }}/singular-{{ version }}.tar.gz
  url: https://github.com/Singular/Singular/archive/refs/tags/Release-{{ version.replace('.', '-') }}.tar.gz
  sha256: f10e47151bebc61b6d188c026acdcddfa46cbd6303ac512c2b9913b41242b7f8
  patches:
    - ncursesw.patch
    - offsetof.patch
    - fq_nmod_mat_entry.patch
    - fq_nmod_mat_entry.2.patch

build:
  number: 3
  skip: true  # [win]
  run_exports:
    - {{ pin_subpackage('singular', max_pin='x.x.x.x') }}

requirements:
  build:
    - gnuconfig  # [unix]
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - libtool
    - automake
    - autoconf
    - pkg-config
    - make
    - sed
  host:
    - gmp
    - mpfr
    - ntl
    - libflint {{ libflint }}
    - cddlib
    - readline
    - ncurses
  run:
    - gmp
    - mpfr
    - ntl
    - cddlib
    - readline
    - ncurses

test:
  commands:
    - test -f ${PREFIX}/include/singular/Singular/libsingular.h
    - test -f ${PREFIX}/lib/libSingular.a
    - test -f ${PREFIX}/lib/libSingular.dylib     # [osx]
    - test -f ${PREFIX}/lib/libSingular.so        # [linux]

about:
  home: https://www.singular.uni-kl.de/
  license: GPL-2.0-or-later
  license_file: COPYING
  summary: |
    Singular is a computer algebra system for polynomial computations, with special emphasis
    on commutative and non-commutative algebra, algebraic geometry, and singularity theory
  dev_url: https://github.com/Singular/Sources

extra:
  recipe-maintainers:
    - isuruf
    - saraedum
